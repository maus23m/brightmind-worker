<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrightMind</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }

    h1 { font-size: 1.8rem; color: #3b4bdb; margin-bottom: 0.25rem; }
    .subtitle { color: #6b7280; margin-bottom: 1.5rem; font-size: 0.95rem; }

    label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 0.3rem; margin-top: 1rem; }

    select, input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 1rem;
      color: #111827;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input:focus { border-color: #3b4bdb; background: white; }

    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.75rem;
      background: #3b4bdb;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #2f3cc4; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    #status { margin-top: 1rem; font-size: 0.9rem; color: #6b7280; text-align: center; min-height: 1.4em; }

    #questions { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

    .question-card {
      border: 1.5px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
    }
    .question-card .q { font-weight: 600; color: #111827; margin-bottom: 0.5rem; }
    .question-card .subject { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .question-card svg { max-width: 100%; display: block; margin: 0.5rem 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>BrightMind ✨</h1>
    <p class="subtitle">Generate curriculum-aligned questions for your child</p>

    <label for="childId">Child ID</label>
    <input type="text" id="childId" placeholder="e.g. child_001" value="child_001" />

    <label for="yearGroup">Year Group</label>
    <select id="yearGroup">
      <option value="Year 1">Year 1</option>
      <option value="Year 2">Year 2</option>
      <option value="Year 3">Year 3</option>
      <option value="Year 4" selected>Year 4</option>
      <option value="Year 5">Year 5</option>
      <option value="Year 6">Year 6</option>
    </select>

    <label for="subject">Subject</label>
    <select id="subject">
      <option value="Maths">Maths</option>
      <option value="Science">Science</option>
      <option value="English">English</option>
    </select>

    <label for="count">Number of questions</label>
    <input type="number" id="count" min="1" max="10" value="5" />

    <button id="generateBtn" onclick="generate()">Generate Questions</button>
    <div id="status"></div>
    <div id="questions"></div>
  </div>

  <script>
    // Replace with your Cloud Run service URL
    const API_URL = 'https://brightmind-worker-HASH-ew.a.run.app';

    async function generate() {
      const btn = document.getElementById('generateBtn');
      const status = document.getElementById('status');
      const container = document.getElementById('questions');

      btn.disabled = true;
      status.textContent = 'Generating questions…';
      container.innerHTML = '';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            childId:   document.getElementById('childId').value.trim(),
            yearGroup: document.getElementById('yearGroup').value,
            subject:   document.getElementById('subject').value,
            count:     parseInt(document.getElementById('count').value, 10),
          }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        const questions = data.questions ?? [];

        if (questions.length === 0) {
          status.textContent = 'No questions returned.';
          return;
        }

        status.textContent = `${questions.length} question${questions.length !== 1 ? 's' : ''} generated`;
        container.innerHTML = questions.map((q, i) => `
          <div class="question-card">
            <div class="subject">${q.subject ?? ''} · ${q.topic ?? ''}</div>
            <div class="q">${i + 1}. ${q.question_text ?? q.question ?? ''}</div>
            ${q.svg_diagram ? q.svg_diagram : ''}
          </div>
        `).join('');

      } catch (err) {
        status.textContent = `Error: ${err.message}`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
